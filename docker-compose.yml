services:
  backend:
    image: ghcr.io/${OWNER}/film-react-nest-backend:latest
    container_name: film-backend
    restart: unless-stopped
    environment:
      DATABASE_DRIVER: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USERNAME}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      NODE_ENV: production
      LOGGER_FORMAT: ${LOGGER_FORMAT}
      DEBUG: ${DEBUG}
    depends_on:
      - postgres
    networks:
      - frontend-tier
      - backend-tier

  frontend:
    image: ghcr.io/${OWNER}/film-react-nest-frontend:latest
    container_name: film-frontend
    restart: unless-stopped
    args:
      VITE_API_URL: ${VITE_API_URL}
      VITE_CDN_URL: ${VITE_CDN_URL}
    depends_on:
      - backend
    networks:
      - frontend-tier
    volumes:
      - frontend_dist:/app-dist

  nginx:
    image: ghcr.io/${OWNER}/film-react-nest-nginx:latest
    container_name: film-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - frontend-tier
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - frontend-tier
    depends_on:
      - nginx

  postgres:
    image: postgres:16-alpine
    container_name: film-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-tier
    environment:
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USERNAME} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    ports:
      - '${PGADMIN_PORT:-8080}:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_PORT: ${PGADMIN_PORT}
    networks:
      - backend-tier
      - admin-tier
    depends_on:
      - postgres

networks:
  frontend-tier:
    driver: bridge
    name: film-frontend-network

  backend-tier:
    driver: bridge
    name: film-backend-network

  admin-tier:
    driver: bridge
    name: film-admin-network

volumes:
  postgres_data:
  pgadmin_data:
  frontend_dist:
